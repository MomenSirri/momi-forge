<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }
    .stage {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 30% 25%, rgba(103, 211, 255, 0.12), transparent 52%);
    }
    #anim {
      width: 100%;
      height: 100%;
    }
  </style>
  <script src="./lottie.min.js"></script>
</head>
<body>
  <div class="stage">
    <div id="anim" aria-hidden="true"></div>
  </div>
  <script>
    window.addEventListener("DOMContentLoaded", function () {
      if (!window.lottie) {
        return;
      }
      window.lottie.loadAnimation({
        container: document.getElementById("anim"),
        renderer: "svg",
        loop: true,
        autoplay: true,
        path: "./momi-splash.json"
      });
    });
  </script>
</body>
</html>
